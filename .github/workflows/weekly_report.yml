name: Weekly Lead Report

on:
  schedule:
    - cron: "0 13 * * 1"  # Mondays at 9 AM EDT (13:00 UTC)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LEAD_PIPELINE_DATABASE_URL: ${{ secrets.LEAD_PIPELINE_DATABASE_URL }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
          INDUSTRY_CONTEXT: ${{ secrets.INDUSTRY_CONTEXT }}
        run: python main.py --mode report

  investigate-on-failure:
    needs: [report]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CI investigator
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh workflow run watcher.yml --repo abdirahman2ali/ci-investigator
